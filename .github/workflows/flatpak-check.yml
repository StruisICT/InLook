name: Flatpak build check

# End-to-end verification that the Flatpak manifest builds with the current
# vendored Cargo sources. Triggered by changes under packaging/flatpak/ so we
# catch breakage before submitting a manifest update to Flathub. Also
# manually triggerable.

on:
  pull_request:
    paths:
      - 'packaging/flatpak/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'assets/inlook.png'
      - 'assets/inlook.desktop'
  workflow_dispatch:

concurrency:
  group: flatpak-check-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: flatpak-builder
    runs-on: ubuntu-latest
    # Pulling the GNOME runtime + building the offline cargo tree is slow.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak + flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME runtime + Rust SDK extension
        run: |
          flatpak install --user --noninteractive flathub \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build
        run: |
          flatpak-builder --user --force-clean --disable-rofiles-fuse \
            build \
            packaging/flatpak/com.struisict.InLook.yaml

      - name: Verify entrypoint exists in the resulting tree
        run: |
          test -x build/files/bin/inlook
          test -f build/files/share/applications/com.struisict.InLook.desktop
          test -f build/files/share/metainfo/com.struisict.InLook.metainfo.xml
          echo "OK — Flatpak tree contains the expected files."

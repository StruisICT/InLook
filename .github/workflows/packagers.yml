name: Update package manifests

# Fires after release-please publishes a GitHub Release. Bumps three
# package manager manifests so InLook stays current on winget, Homebrew,
# and Flathub without manual intervention.
#
# Requires:
#   - repository variable ENABLE_PACKAGERS=true  (master switch)
#   - secret PACKAGERS_TOKEN                     (PAT with `repo` scope —
#     pushes to homebrew-tap, forks winget-pkgs)
#
# Each job is independent; a failure in one packager doesn't block the others.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.5.0) — used when re-running manually"
        required: true

permissions:
  contents: write

concurrency:
  group: packagers-${{ github.event.release.tag_name || github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  update-winget:
    name: winget — submit manifest update
    if: ${{ vars.ENABLE_PACKAGERS == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.release.tag_name || github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: winget-releaser
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: StruisICT.InLook
          installers-regex: 'inlook-.*\.msi$'
          release-tag: ${{ steps.tag.outputs.tag }}
          token: ${{ secrets.PACKAGERS_TOKEN }}

  update-homebrew:
    name: Homebrew — bump cask in source and tap
    if: ${{ vars.ENABLE_PACKAGERS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGERS_TOKEN }}

      - name: Bump packaging/homebrew/inlook.rb
        id: bump
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${TAG#v}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/InLook-${VERSION}-universal.dmg"
          echo "Fetching $DMG_URL"
          DMG_SHA=$(curl -fsSL "$DMG_URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$DMG_SHA"
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" packaging/homebrew/inlook.rb
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${DMG_SHA}\"/" packaging/homebrew/inlook.rb
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit source-of-truth bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet packaging/homebrew/inlook.rb; then
            echo "no change — already at ${{ steps.bump.outputs.version }}"
            exit 0
          fi
          git add packaging/homebrew/inlook.rb
          git commit -m "homebrew: bump cask to ${{ steps.bump.outputs.version }}"
          git push

      - name: Mirror cask to StruisICT/homebrew-tap
        run: |
          git clone --depth=1 "https://x-access-token:${{ secrets.PACKAGERS_TOKEN }}@github.com/StruisICT/homebrew-tap.git" /tmp/tap
          cp packaging/homebrew/inlook.rb /tmp/tap/Casks/inlook.rb
          cd /tmp/tap
          if git diff --quiet Casks/inlook.rb; then
            echo "tap already in sync"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/inlook.rb
          git commit -m "inlook: ${{ steps.bump.outputs.version }}"
          git push

  update-flatpak:
    name: Flatpak — regenerate sources and bump manifest
    if: ${{ vars.ENABLE_PACKAGERS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGERS_TOKEN }}
          fetch-depth: 0  # need tags + history to resolve the release commit

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: pip install --quiet "aiohttp<4,>=3.9.5" "PyYAML<7,>=6" "tomlkit>=0.13.3,<1"

      - name: Regenerate generated-sources.json
        run: |
          curl -fsSL -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python /tmp/flatpak-cargo-generator.py Cargo.lock \
            -o packaging/flatpak/generated-sources.json

      - name: Bump manifest tag + commit
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          COMMIT=$(git rev-list -n 1 "$TAG")
          MANIFEST=packaging/flatpak/com.struisict.InLook.yaml
          # Update only the inlook git source (the first git source in the file)
          python - <<PY
          import re, pathlib
          p = pathlib.Path("$MANIFEST")
          s = p.read_text()
          s = re.sub(r'(\s+tag:\s+)v[\d.]+', r'\g<1>$TAG', s, count=1)
          s = re.sub(r'(\s+commit:\s+)[0-9a-f]{40}', r'\g<1>$COMMIT', s, count=1)
          p.write_text(s)
          PY

      - name: Commit Flatpak bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet packaging/flatpak/; then
            echo "no change — Cargo.lock and tag both already current"
            exit 0
          fi
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          git add packaging/flatpak/
          git commit -m "flatpak: bump to ${TAG#v}"
          git push

name: Fuzz

# Smoke-fuzz the EML → HTML renderer. Kept out of checks.yml because the
# libFuzzer/ASan build is slow; it only runs when the render path changes,
# on manual dispatch, or on the weekly schedule.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  pull_request:
    paths:
      - "src/render.rs"
      - "src/msg.rs"
      - "src/lib.rs"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Smoke-fuzz render_eml
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (wry/webkit2gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Seed corpus from test fixtures
        run: |
          mkdir -p fuzz/corpus/render_eml
          cp tests/fixtures/*.eml tests/fixtures/*.msg test/*.eml fuzz/corpus/render_eml/

      - name: Fuzz for 2 minutes
        # --release (-O): fuzz the configuration we actually ship. Without it
        # cargo-fuzz builds with debug-assertions on, which trips an *upstream*
        # debug_assert!(false) in mail-parser (parsers/message.rs, "Invalid
        # part ID") on some malformed multipart input. That assert is compiled
        # out in the released (release, panic=abort) binary — parsing just
        # continues — so it is not a real crash for users, but it would red
        # this job forever. Release still catches genuine panics (out-of-bounds
        # indexing, unwrap, slice ranges) since those abort regardless of
        # debug-assertions; our own arithmetic is additionally covered by the
        # proptest suite (tests/properties.rs).
        #
        # Explicit --target: the prebuilt cargo-fuzz binary is musl-linked and
        # would otherwise default to x86_64-unknown-linux-musl, where static
        # libc conflicts with ASan ("sanitizer is incompatible with statically
        # linked libc").
        run: cargo +nightly fuzz run --release render_eml --target x86_64-unknown-linux-gnu -- -max_total_time=120

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

name: Fuzz

# Smoke-fuzz the EML → HTML renderer. Kept out of checks.yml because the
# libFuzzer/ASan build is slow; it only runs when the render path changes,
# on manual dispatch, or on the weekly schedule.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  pull_request:
    paths:
      - "src/render.rs"
      - "src/lib.rs"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Smoke-fuzz render_eml
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (wry/webkit2gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Seed corpus from test fixtures
        run: |
          mkdir -p fuzz/corpus/render_eml
          cp tests/fixtures/*.eml test/*.eml fuzz/corpus/render_eml/

      - name: Fuzz for 2 minutes
        run: cargo +nightly fuzz run render_eml -- -max_total_time=120

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

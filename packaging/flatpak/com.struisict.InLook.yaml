id: com.struisict.InLook
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: inlook

finish-args:
  # GUI
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Read EML files from anywhere the user points us at (file-association
  # path) and from the common Downloads / Documents locations. Read-only:
  # InLook is a viewer, it never writes user data.
  - --filesystem=host:ro
  # No network — the viewer is offline-only. The CSP in render.rs already
  # blocks remote loads at the WebView level; this enforces it at the
  # sandbox level too.

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/inlook/cargo

modules:
  - name: inlook
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/inlook /app/bin/inlook
      - install -Dm644 assets/inlook.desktop /app/share/applications/com.struisict.InLook.desktop
      - desktop-file-edit --set-key=Icon --set-value=com.struisict.InLook /app/share/applications/com.struisict.InLook.desktop
      - install -Dm644 assets/inlook.png /app/share/icons/hicolor/256x256/apps/com.struisict.InLook.png
      - install -Dm644 packaging/flatpak/com.struisict.InLook.metainfo.xml /app/share/metainfo/com.struisict.InLook.metainfo.xml
    sources:
      - type: git
        url: https://github.com/StruisICT/InLook.git
        tag: v1.0.0
        commit: 1f7d2b85930acbe10edd0a20eafdf9fb4ce537cd
      - generated-sources.json

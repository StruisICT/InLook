ShortDescription: Fast, safe .eml email viewer. Free Software from Struis ICT.
Description: |-
  InLook is a small, fast viewer for .eml email files. It renders the message
  headers, body, and attachment list in a native window with no network access
  and no remote image loading. HTML bodies are shown in a sandboxed frame under
  a strict Content-Security-Policy, so tracking pixels and scripts never run.
  Free Software from Struis ICT.
